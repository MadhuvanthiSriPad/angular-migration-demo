<div class="page-container">
  <h1 class="section-title">Customers</h1>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="customers" class="full-width-table">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let c">{{ c.firstName }} {{ c.lastName }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let c">{{ c.email }}</td>
        </ng-container>

        <ng-container matColumnDef="tier">
          <th mat-header-cell *matHeaderCellDef>Tier</th>
          <td mat-cell *matCellDef="let c">
            <mat-chip [style.background-color]="getTierColor(c.tier)" class="tier-chip">
              {{ c.tier | titlecase }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="totalOrders">
          <th mat-header-cell *matHeaderCellDef>Orders</th>
          <td mat-cell *matCellDef="let c">{{ c.totalOrders }}</td>
        </ng-container>

        <ng-container matColumnDef="totalSpend">
          <th mat-header-cell *matHeaderCellDef>Total Spend</th>
          <td mat-cell *matCellDef="let c">{{ c.totalSpend | currency }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let c">
            <span class="status-badge {{ c.status }}">{{ c.status }}</span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
